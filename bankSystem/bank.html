<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank System</title>
  <link rel="stylesheet" href="bank.css">
</head>
<body>

  <header class="header">
    <h1>Bank System</h1>
  </header>

  <div class="summary-grid">
    <div class="summary-card">
      <p class="summary-label">Total Balance</p>
      <p class="summary-value" id="total-balance">$0.00</p>
    </div>
    <div class="summary-card">
      <p class="summary-label">Total Accounts</p>
      <p class="summary-value" id="total-accounts">0</p>
    </div>
  </div>

  <main class="container">

    <div class="tabs" role="tablist">
      <button class="tab active" onclick="switchTab('accounts')" role="tab">All Accounts</button>
      <button class="tab"        onclick="switchTab('create')"   role="tab">Create Account</button>
    </div>

    <!-- ALL ACCOUNTS -->
    <div id="panel-accounts" class="panel active">
      <div id="accounts-list">
        <p class="empty-msg">No accounts yet. Create one to get started.</p>
      </div>
    </div>

    <!-- CREATE ACCOUNT -->
    <div id="panel-create" class="panel">
      <div class="form-group">
        <label for="c-num">Account number</label>
        <input id="c-num" type="number" placeholder="e.g. 1001">
      </div>
      <div class="form-group">
        <label for="c-name">Full name</label>
        <input id="c-name" type="text" placeholder="e.g. Alice Smith">
      </div>
      <div class="form-group">
        <label for="c-bal">Initial balance ($)</label>
        <input id="c-bal" type="number" placeholder="e.g. 500">
      </div>
      <button class="btn-primary" onclick="createAccount()">Create Account</button>
      <div id="c-msg" class="message"></div>
    </div>

  </main>

  <!-- ── ACCOUNT DETAIL BOTTOM SHEET ──────────────────────────── -->
  <div id="detail-overlay" class="detail-overlay">
    <div class="detail-sheet">

      <!-- drag handle -->
      <div class="sheet-handle"></div>

      <!-- dark header with balance -->
      <div class="detail-header">
        <button class="detail-close-btn" onclick="closeDetail()">✕</button>
        <div class="detail-holder-name" id="detail-holder-name">Name</div>
        <div class="detail-account-num" id="detail-account-num">#0000</div>
        <div class="detail-balance-row">
          <div>
            <span class="detail-balance-label">Available balance</span>
            <div class="detail-balance-amount masked" id="detail-balance-amount">••••••</div>
          </div>
          <button class="eye-btn" id="eye-btn" onclick="toggleBalance()" title="Show / hide balance">👁</button>
        </div>
      </div>

      <!-- quick action buttons -->
      <div class="detail-actions">
        <button class="action-btn" onclick="showSheetForm('deposit')">
          <span class="icon">⬇️</span>
          Deposit
        </button>
        <button class="action-btn" onclick="showSheetForm('withdraw')">
          <span class="icon">⬆️</span>
          Withdraw
        </button>
        <button class="action-btn" onclick="showSheetForm('transfer')">
          <span class="icon">↔️</span>
          Transfer
        </button>
      </div>

      <!-- DEPOSIT FORM -->
      <div id="sheet-deposit" class="sheet-form">
        <h3>Deposit</h3>
        <div class="form-group">
          <label for="s-dep-amt">Amount ($)</label>
          <input id="s-dep-amt" type="number" placeholder="e.g. 200">
        </div>
        <button class="btn-primary" onclick="sheetDeposit()">Deposit</button>
        <div id="s-dep-msg" class="message"></div>
      </div>

      <!-- WITHDRAW FORM -->
      <div id="sheet-withdraw" class="sheet-form">
        <h3>Withdraw</h3>
        <div class="form-group">
          <label for="s-with-amt">Amount ($)</label>
          <input id="s-with-amt" type="number" placeholder="e.g. 100">
        </div>
        <button class="btn-primary" onclick="sheetWithdraw()">Withdraw</button>
        <div id="s-with-msg" class="message"></div>
      </div>

      <!-- TRANSFER FORM -->
      <div id="sheet-transfer" class="sheet-form">
        <h3>Transfer</h3>
        <div class="form-group">
          <label for="s-trf-from">From account #</label>
          <input id="s-trf-from" type="number" readonly style="background:#f9f9f9; color:#888;">
        </div>
        <div class="form-group">
          <label for="s-trf-to">To account #</label>
          <input id="s-trf-to" type="number" placeholder="Destination account number">
        </div>
        <div class="form-group">
          <label for="s-trf-amt">Amount ($)</label>
          <input id="s-trf-amt" type="number" placeholder="e.g. 50">
        </div>
        <button class="btn-primary" onclick="sheetTransfer()">Transfer</button>
        <div id="s-trf-msg" class="message"></div>
      </div>

      <!-- CLOSE ACCOUNT -->
      <div class="detail-danger">
        <button class="btn-danger" onclick="confirmClose()">Close this account</button>
      </div>

    </div><!-- /.detail-sheet -->
  </div><!-- /#detail-overlay -->

  <script src="banksystem.js"></script>
  <script>
    // Confirm before closing an account
    function confirmClose() {
      if (confirm("Are you sure you want to close this account? This cannot be undone.")) {
        closeAccount();
      }
    }
  </script>
</body>
</html>
