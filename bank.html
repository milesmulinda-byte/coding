<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: rgb(83, 148, 176);
        }
        h1 {
            color: rgb(23, 23, 193);
            text-align: center;
            background-color: rgb(208, 207, 216);
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: lab(69.48% -12.46 -32.03);
            
        } #nameOutput {
            margin-top: 20px;
            font-size: 18px;
            color: rgb(233, 234, 233);
        }
         
    </style>
</head>
<body>
    <div class="container">
<h1>Welcome to the bank</h1> 
  <input type="text" placeholder="Enter your name" id="nameInput"> 
  <button id="triggerButton">see Name</button>
 <p id="nameOutput"></p>
    </div>
    
</body>
<!-- <script src="./banksystem.js"></script>  -->
 <script>
  let input = document.getElementById('nameInput');
  let button = document.getElementById('triggerButton');
  let output = document.getElementById('nameOutput');

    button.addEventListener('click', function() {
        let name = input.value;
        output.textContent = 'Hello, ' + name + '! Welcome to the bank.';
    });
    
    input.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        let name = input.value;
        output.textContent = 'Hello, ' + name + '! Welcome to the bank.';
    }
});
 </script>
</script>
</html>
